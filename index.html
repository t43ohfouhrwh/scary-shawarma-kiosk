<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/gulamen/css@main/TemplateData/favicon.ico">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/gulamen/css@main/TemplateData/style.css">

<style>
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  #unity-container {
    width: 100%;
    height: 100%;
  }

  #unity-canvas {
    width: 100%;
    height: 100%;
  }
</style>
</head>

<body>

<div id="unity-container" class="unity-desktop">

  <canvas id="unity-canvas" tabindex="-1"></canvas>

  <div id="unity-loading-bar" style="display:none;">
    <div id="unity-logo"></div>

    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>

  <div id="unity-warning"></div>

  <div id="unity-footer">
    <div id="unity-webgl-logo"></div>
    <div id="unity-fullscreen-button"></div>
    <div id="unity-build-title">
      Scary Shawarma Anomaly Kiosk
    </div>
  </div>

</div>

<script>

  const container = document.querySelector("#unity-container");
  const canvas = document.querySelector("#unity-canvas");
  const loadingBar = document.querySelector("#unity-loading-bar");
  const progressBarFull = document.querySelector("#unity-progress-bar-full");
  const fullscreenButton = document.querySelector("#unity-fullscreen-button");
  const warningBanner = document.querySelector("#unity-warning");

  function unityShowBanner(msg, type) {

    function updateBannerVisibility() {
      warningBanner.style.display =
        warningBanner.children.length ? 'block' : 'none';
    }

    const div = document.createElement('div');
    div.innerHTML = msg;

    warningBanner.appendChild(div);

    if (type === 'error') {
      div.style = 'background:red;padding:10px;';
    } else {

      if (type === 'warning') {
        div.style = 'background:yellow;padding:10px;';
      }

      setTimeout(() => {
        warningBanner.removeChild(div);
        updateBannerVisibility();
      }, 5000);
    }

    updateBannerVisibility();
  }

  const buildUrl =
    "https://cdn.jsdelivr.net/gh/gulamen/css@main/Build";

  const loaderUrl =
    buildUrl + "/0.0.4.loader.js";

  const config = {
    dataUrl: buildUrl + "/0.0.4.data.unityweb",
    frameworkUrl: buildUrl + "/0.0.4.framework.js.unityweb",
    codeUrl: buildUrl + "/0.0.4.wasm.unityweb",

    streamingAssetsUrl:
      "https://cdn.jsdelivr.net/gh/gulamen/css@main/StreamingAssets",

    companyName: "Hidden Miracles Studio",
    productName: "Scary Shawarma Anomaly Kiosk",
    productVersion: "1.3",

    showBanner: unityShowBanner,
  };

  if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {

    const meta = document.createElement('meta');

    meta.name = 'viewport';

    meta.content =
      'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';

    document.getElementsByTagName('head')[0].appendChild(meta);

    container.className = "unity-mobile";
    canvas.className = "unity-mobile";

  } else {

    canvas.style.width = "100%";
    canvas.style.height = "100%";
  }

  loadingBar.style.display = "block";

  const script = document.createElement("script");

  script.src = loaderUrl;

  script.onload = () => {

    createUnityInstance(canvas, config, (progress) => {

      progressBarFull.style.width =
        (100 * progress) + "%";

    })

    .then((unityInstance) => {

      loadingBar.style.display = "none";

      fullscreenButton.onclick = () => {
        unityInstance.SetFullscreen(1);
      };

    })

    .catch((message) => {
      alert(message);
    });
  };

  document.body.appendChild(script);

</script>

</body>
</html>
